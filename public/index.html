<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>KNG расчёт тяг</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      background-image: url('https://fomaed.github.io/kng-tyagi-miniapp/public/bg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: Arial, sans-serif;
      font-size: 18px;
      color: #ffffff;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.65);
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      padding: 24px 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 24px;
      color: #ffffff;
      text-align: center;
    }
    .field {
      margin-bottom: 16px;
    }
    .field-title {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
    }
    input[type="number"],
    select {
      width: 100%;
      padding: 10px 14px;
      font-size: 18px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      outline: none;
    }
    input[type="number"]::placeholder {
      color: rgba(255,255,255,0.5);
    }
    select option {
      background: #1a1a2e;
      color: #ffffff;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      font-size: 20px;
      font-weight: bold;
      background: #2ec4a5;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button[type="submit"]:active {
      background: #25a88c;
    }
    #hints {
      margin-top: 20px;
      font-size: 16px;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
    }
    #errors {
      margin-top: 10px;
      font-size: 16px;
      color: #ff6b6b;
      font-weight: 600;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #ffffff;
      white-space: pre-wrap;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 16px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>KNG расчёт тяг</h1>
    <form id="calcForm">
      <div class="field">
        <label class="field-title" for="width">Ширина створки (мм):</label>
        <input type="number" id="width" placeholder="например 800" required>
      </div>
      <div class="field">
        <label class="field-title" for="height">Высота створки (мм):</label>
        <input type="number" id="height" placeholder="например 2100" required>
      </div>
      <div class="field">
        <label class="field-title" for="L1">L1 (мм):</label>
        <input type="number" id="L1">
      </div>
      <div class="field">
        <label class="field-title" for="L2">L2 (мм):</label>
        <input type="number" id="L2">
      </div>
      <div class="field">
        <label class="field-title" for="L3">L3 (мм):</label>
        <input type="number" id="L3">
      </div>
      <div class="field">
        <label class="field-title" for="L4">L4 (мм):</label>
        <input type="number" id="L4">
      </div>
      <div class="field">
        <label class="field-title" for="L5">L5 (мм):</label>
        <input type="number" id="L5">
      </div>
      <div class="field">
        <label class="field-title" for="series">Серия ручки:</label>
        <select id="series">
          <option value="standard_design">Стандарт / Дизайн</option>
          <option value="premium_mini_disc">Premium / Minimalist / Discovery</option>
          <option value="handle_4square">Ручки под 4-х гран ред-р</option>
        </select>
      </div>
      <div class="field">
        <label class="field-title" for="hinge">Тип петель:</label>
        <select id="hinge">
          <option value="visible_100">Стандартные петли (видимые) 100кг</option>
          <option value="hidden_100_90">Скрытые петли 100 кг 90°</option>
          <option value="first_tilt_160_180">Скрытые First Tilt 160 кг 180°</option>
        </select>
      </div>
      <button type="submit">Рассчитать</button>
    </form>
    <div id="hints"></div>
    <div id="errors"></div>
    <div id="result"></div>
  </div>
  <script src="app.js"></script>
  <script>
    if (window.Telegram && window.Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }
  </script>
</body>
</html>
